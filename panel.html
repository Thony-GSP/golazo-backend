<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLAZO SP - ADMIN 2.5</title>
    <style>
        :root { --primary: #ef4444; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .dashboard { max-width: 1000px; margin: auto; background: var(--card); padding: 15px; border-radius: 16px; border-top: 5px solid var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-top: 15px; }
        .section { background: var(--bg); padding: 15px; border-radius: 12px; border: 1px solid #334155; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #475569; background: var(--card); color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-crear { background: #10b981; color: white; }
        .btn-socio { background: #f59e0b; color: white; }
        .btn-bot { background: #a855f7; color: white; }
        .btn-avisar { background: #3b82f6; padding: 5px; font-size: 10px; width: auto; }
        .resultado-box { background: #000; color: #22c55e; padding: 12px; border-radius: 8px; font-family: monospace; display: none; white-space: pre-wrap; font-size: 12px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td, th { padding: 12px; text-align: left; font-size: 13px; border-bottom: 1px solid #1e293b; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>⚙️ GOLAZO SP - CENTRAL</h1>
    <input type="password" id="adminSecret" placeholder="🔐 Clave Maestra">

    <div class="grid">
        <div class="section">
            <h2>🤖 CONFIGURAR BOT</h2>
            <input type="text" id="botPromo" placeholder="Promo hoy (Fase 1)">
            <textarea id="botPartidos" placeholder="Cartelera (Fase 2)" style="height:80px;"></textarea>
            <input type="text" id="botLinkVip" placeholder="Link Grupo YouTube">
            <button class="btn-bot" onclick="actualizarBot()">Actualizar Bot</button>
        </div>

        <div class="section">
            <h2>⚡ PASE / SOCIO</h2>
            <input type="text" id="nombreEvento" placeholder="Nombre Evento / Email Socio">
            <input type="datetime-local" id="fechaCorte">
            <div style="display:flex; gap:10px;">
                <button class="btn-crear" onclick="generarPase(false)">Pase</button>
                <button class="btn-socio" onclick="generarPase(true)">VIP</button>
            </div>
            <div id="resPase" class="resultado-box"></div>
        </div>
    </div>

    <div style="display:flex; justify-content: space-between; align-items:center; margin-top:20px;">
        <h2>📊 AUDITORÍA</h2>
        <button onclick="cargarUsuarios()" style="width:auto; background:var(--primary); padding:10px;">🔄</button>
    </div>

    <div style="overflow-x:auto;">
        <table>
            <thead><tr><th>USUARIO</th><th>TIEMPO</th><th>ACCION</th></tr></thead>
            <tbody id="tablaUsuarios"></tbody>
        </table>
    </div>
</div>

<script>
    const BACKEND_URL = "https://golazo-backend-ellz.onrender.com";

    async function actualizarBot() {
        const s = document.getElementById('adminSecret').value;
        const res = await fetch(`${BACKEND_URL}/admin/update-bot`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                admin_secret: s,
                promo_hoy: document.getElementById('botPromo').value,
                partidos_cartelera: document.getElementById('botPartidos').value,
                link_vip: document.getElementById('botLinkVip').value
            })
        });
        if(res.ok) alert("✅ Bot actualizado!");
    }

    async function generarPase(esSocio) {
        const s = document.getElementById('adminSecret').value;
        const nombre = document.getElementById('nombreEvento').value;
        const fecha = document.getElementById('fechaCorte').value;
        
        const res = await fetch(`${BACKEND_URL}/admin/generar-pase-rapido`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                admin_secret: s, fecha_corte: new Date(fecha).toISOString(), 
                partido: esSocio ? "SOCIO VIP ⭐" : nombre,
                email_manual: esSocio ? nombre : null
            })
        });
        const d = await res.json();
        if(d.success) {
            let msg = "";
            if(esSocio) {
                const link = document.getElementById('botLinkVip').value;
                msg = `🔥 ¡Bienvenido a la experiencia completa de Golazo SP!\n\n1️⃣ Únete aquí al Grupo VIP (Liga 1): ${link}\n2️⃣ Accede aquí a la Web (Internacionales): www.golazosp.net\n👤 User: ${d.usuario}\n🔑 Pass: ${d.clave}`;
            } else {
                msg = `✅ ¡ACCESO LISTO! ⚽\n━━━━━━━━━━━━━━\n🌐 www.golazosp.net\n👤 User: ${d.usuario}\n🔑 Pass: ${d.clave}\n━━━━━━━━━━━━━━\n⏳ Expira: ${d.expira_en}`;
            }
            document.getElementById('resPase').innerText = msg;
            document.getElementById('resPase').style.display = "block";
            navigator.clipboard.writeText(msg); alert("¡Copiado!");
            cargarUsuarios();
        }
    }

    async function cargarUsuarios() {
        const s = document.getElementById('adminSecret').value;
        const res = await fetch(`${BACKEND_URL}/admin/listar-usuarios`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ admin_secret: s })
        });
        const d = await res.json();
        const tbody = document.getElementById('tablaUsuarios'); tbody.innerHTML = '';
        d.usuarios.forEach(u => {
            const horasFaltan = u.rest / 3600000;
            const btnAvisar = (u.tipo === 'socio_mensual' && horasFaltan < 48) ? 
                `<button class="btn-avisar" onclick="avisar('${u.usuario_corto}')">💬 Avisar</button>` : '';
            
            tbody.innerHTML += `<tr>
                <td><b>${u.usuario_corto}</b></td>
                <td>${u.rest > 0 ? Math.floor(horasFaltan) + 'h' : 'Expiró'}</td>
                <td>${btnAvisar}</td>
            </tr>`;
        });
    }

    function avisar(nombre) {
        const msg = `¡Hola ${nombre}! 👋 Te saluda Thony de Golazo SP. Tu acceso VIP vence pronto. ¿Renovamos para no perderte los partidos de mañana? ⚽`;
        navigator.clipboard.writeText(msg); alert("Mensaje de aviso copiado.");
    }
</script>
</body>
</html>
