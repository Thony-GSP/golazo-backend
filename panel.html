<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLAZO SP - CENTRAL MAESTRA</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #ef4444; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 10px; margin: 0; }
        .dashboard { max-width: 1100px; margin: auto; background: var(--card); padding: 20px; border-radius: 16px; border-top: 5px solid var(--primary); }
        h1 { text-align: center; color: var(--primary); font-size: 20px; margin-bottom: 20px; }
        .section { background: var(--bg); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; background: var(--card); color: white; border: 1px solid #475569; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 5px; }
        .btn-crear { background: #10b981; color: white; }
        .res-box { background: #000; color: #22c55e; padding: 12px; border-radius: 8px; margin-top: 10px; display: none; font-family: 'Courier New', monospace; white-space: pre-wrap; line-height: 1.4; border: 1px solid #22c55e; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; font-size: 13px; }
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        
        /* 🔥 NUEVOS ESTILOS DE AUDITORÍA */
        .table-wrap { width: 100%; overflow-x: auto; }
        .audit-table { min-width: 1050px; }
        .muted { color: #94a3b8; font-size: 11px; }
        .btn-small { width: auto; padding: 6px 10px; font-size: 11px; border-radius: 6px; margin: 0; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:disabled { background: #475569; cursor: not-allowed; opacity: 0.6; }
        .badge-session { background: #334155; color: #e2e8f0; }
        .badge-ok { background: #065f46; color: white; }
        .badge-warn { background: #92400e; color: white; }
        .badge-danger { background: #7f1d1d; color: white; }
        .ip-cell { font-family: 'Courier New', monospace; font-size: 12px; }
        .field-label { display: block; margin-top: 8px; color: #cbd5e1; font-size: 12px; font-weight: 700; }
        .stream-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
        .stream-actions button { width: auto; min-width: 170px; }
        .config-status { margin-top: 10px; padding: 10px; border-radius: 8px; background: #020617; color: #cbd5e1; font-size: 13px; }
        .config-status.ok { color: #22c55e; border: 1px solid #166534; }
        .config-status.error { color: #fca5a5; border: 1px solid #991b1b; }
        .transmission-list { display: grid; gap: 14px; margin-top: 12px; }
        .transmission-item { background: #111827; border: 1px solid #475569; border-radius: 8px; padding: 14px; }
        .transmission-head { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
        .transmission-head strong { font-size: 15px; }
        .compact-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .compact-actions button { width: auto; min-width: 0; padding: 7px 10px; margin: 0; font-size: 11px; }
        .transmission-fields { display: grid; grid-template-columns: minmax(220px, 2fr) minmax(180px, 1fr); gap: 10px; }
        .check-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; color: #cbd5e1; font-size: 12px; font-weight: 700; }
        .check-row input { width: auto; margin: 0; }
        .option-list { display: grid; gap: 8px; margin-top: 12px; }
        .option-row { display: grid; grid-template-columns: minmax(110px, .7fr) minmax(145px, .8fr) minmax(240px, 2fr) auto; gap: 8px; align-items: end; padding-top: 10px; border-top: 1px solid #334155; }
        .option-row .field-label { margin-top: 0; }
        .option-actions { display: flex; gap: 6px; padding-bottom: 5px; }
        .option-actions button { width: auto; min-width: 0; padding: 9px 10px; margin: 0; font-size: 11px; }
        .empty-streams { padding: 18px; text-align: center; color: #94a3b8; border: 1px dashed #475569; border-radius: 8px; }
        .btn-neutral { background: #475569; color: white; }
        @media (max-width: 760px) {
            .transmission-fields, .option-row { grid-template-columns: 1fr; }
            .option-actions { padding-bottom: 0; }
            .transmission-head { align-items: flex-start; flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <h1>⚙️ GOLAZO SP - MANDO CENTRAL</h1>
    
    <div id="loginAdmin" class="section">
        <h2>🔐 Acceso Administrador</h2>
        <input type="email" id="adminEmail" placeholder="Correo administrador">
        <input type="password" id="adminPassword" placeholder="Contraseña">
        <button class="btn-crear" onclick="loginAdmin()">Ingresar al Panel</button>
    </div>

    <div id="adminInfo" class="section" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
            <span id="adminUserText" style="font-weight:bold;">Administrador conectado</span>
            <button onclick="logoutAdmin()" style="width:auto; background:#475569; padding:8px 15px;">Cerrar sesión</button>
        </div>
    </div>

    <div id="panelContenido" style="display:none;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;">
            <div class="section">
                <h2>⚡ PASE RÁPIDO</h2>
                <input type="text" id="nombrePartido" placeholder="Ej: Cristal vs Universitario">
                <input type="datetime-local" id="fechaCorte">
                <button class="btn-crear" onclick="generarPase(false)">Crear y Copiar</button>
                <div id="resPase" class="res-box"></div>
            </div>
            
            <div class="section">
                <h2>💎 SOCIO VIP</h2>
                <input type="email" id="socioEmail" placeholder="Email del socio">
                <input type="text" id="linkVip" placeholder="Link Grupo VIP opcional">
                <select id="socioMeses">
                    <option value="30">Plan 1 Mes</option>
                    <option value="60">Plan 2 Meses</option>
                </select>
                <button class="btn-crear" style="background:#f59e0b" onclick="generarPase(true)">Activar VIP</button>
                <div id="resSocio" class="res-box" style="color:#f59e0b; border-color:#f59e0b"></div>
            </div>
        </div>

        <div class="section">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
                <h2>TRANSMISIONES</h2>
                <button class="btn-crear" type="button" style="width:auto; padding:9px 14px;" onclick="agregarTransmision()">Agregar transmisión</button>
            </div>

            <div id="transmissionList" class="transmission-list"></div>

            <div class="stream-actions">
                <button class="btn-crear" id="btnSaveStream" onclick="guardarConfigStream()">Guardar y aplicar</button>
                <button class="btn-neutral" type="button" onclick="cargarConfigStream()">Recargar configuración</button>
            </div>

            <div id="streamConfigStatus" class="config-status">Configuración pendiente de cargar.</div>
        </div>

        <div class="section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>📊 AUDITORÍA Y CONTROL</h2>
                <div style="display: flex; gap: 10px;">
                    <button onclick="cargarUsuarios()" style="width:auto; padding:8px 15px;">🔄 Refrescar</button>
                    <button onclick="limpiarCaducados()" style="width:auto; background:#475569; padding:8px 15px;">🧹 Limpiar</button>
                </div>
            </div>
            <div class="table-wrap">
                <table class="audit-table">
                    <thead>
                        <tr>
                            <th>USUARIO</th>
                            <th>TIPO/PARTIDO</th>
                            <th>ESTADO</th>
                            <th>EXPIRA</th>
                            <th>ÚLTIMA ACTIVIDAD</th>
                            <th>IP</th>
                            <th>SESIÓN</th>
                            <th>CLAVE</th>
                            <th>ACCIÓN</th>
                        </tr>
                    </thead>
                    <tbody id="tablaUsuarios"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = "https://golazo-backend-ellz.onrender.com";

    const firebaseConfig = {
        apiKey: "AIzaSyCJ9fHy1ldvHFp6NdMexfoz4KR4d54j_Hw",
        authDomain: "golazostreamperu-de4fd.firebaseapp.com",
        projectId: "golazostreamperu-de4fd",
        storageBucket: "golazostreamperu-de4fd.firebasestorage.app",
        messagingSenderId: "940862641322",
        appId: "1:940862641322:web:a2afefcc21a5e5245decd3"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    
    // 🔐 Seguridad admin: la sesión del panel dura solo mientras el navegador siga abierto.
    auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);

    let autoRefreshInterval = null;
    let cargandoUsuarios = false;
    let streamTransmissions = [];
    let defaultTransmissionId = "";

    function iniciarAutoRefresh() {
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
        }

        autoRefreshInterval = setInterval(() => {
            const panelVisible = document.getElementById('panelContenido').style.display !== "none";

            if (auth.currentUser && panelVisible && !cargandoUsuarios) {
                cargarUsuarios();
            }
        }, 30000);
    }

    function detenerAutoRefresh() {
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
        }
    }

    window.onload = () => {
        let n = new Date();
        n.setHours(n.getHours() + 4);
        n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
        document.getElementById('fechaCorte').value = n.toISOString().slice(0,16);

        auth.onAuthStateChanged(async (user) => {
            if (!user) return;

            try {
                const tokenResult = await user.getIdTokenResult(true);
                if (tokenResult.claims.admin === true) {
                    mostrarPanelAdmin(user.email);
                    cargarUsuarios();
                } else {
                    await auth.signOut();
                }
            } catch (e) {
                console.error(e);
            }
        });
    };

    async function loginAdmin() {
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;

        if (!email || !password) {
            return alert("Ingresa correo y contraseña de administrador.");
        }

        try {
            await auth.signInWithEmailAndPassword(email, password);
            const user = auth.currentUser;
            const tokenResult = await user.getIdTokenResult(true);

            if (tokenResult.claims.admin !== true) {
                await auth.signOut();
                return alert("Este usuario no tiene permisos de administrador.");
            }

            mostrarPanelAdmin(user.email);
            cargarUsuarios();

        } catch (error) {
            console.error(error);
            alert("No se pudo iniciar sesión como administrador.");
        }
    }

    async function logoutAdmin() {
        detenerAutoRefresh();

        await auth.signOut();

        document.getElementById('loginAdmin').style.display = "block";
        document.getElementById('adminInfo').style.display = "none";
        document.getElementById('panelContenido').style.display = "none";
    }

    function mostrarPanelAdmin(email) {
        document.getElementById('loginAdmin').style.display = "none";
        document.getElementById('adminInfo').style.display = "block";
        document.getElementById('panelContenido').style.display = "block";
        document.getElementById('adminUserText').innerText = `Administrador: ${email}`;

        iniciarAutoRefresh();
        cargarConfigStream();
    }

    async function getAdminToken() {
        const user = auth.currentUser;
        if (!user) {
            throw new Error("No hay administrador autenticado.");
        }
        return await user.getIdToken();
    }

    async function adminFetch(path, options = {}) {
        const token = await getAdminToken();
        return fetch(`${BACKEND_URL}${path}`, {
            cache: 'no-store',
            ...options,
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`,
                ...(options.headers || {})
            }
        });
    }

    function setStreamConfigStatus(message, type = "") {
        const element = document.getElementById('streamConfigStatus');
        element.textContent = message;
        element.className = `config-status${type ? ` ${type}` : ""}`;
    }

    function isValidHttpsUrl(value) {
        try {
            return new URL(String(value || "").trim()).protocol === "https:";
        } catch (_) {
            return false;
        }
    }

    function crearIdEditor(prefix) {
        const randomPart = window.crypto?.randomUUID
            ? window.crypto.randomUUID().replaceAll('-', '').slice(0, 12)
            : `${Date.now()}${Math.random().toString(36).slice(2, 8)}`;
        return `${prefix}-${randomPart}`.toLowerCase();
    }

    function crearOpcion(sourceType = "iframe", index = 0) {
        return {
            id: crearIdEditor("opcion"),
            label: `Opción ${index + 1}`,
            source_type: sourceType,
            enabled: true,
            url: "",
            path: sourceType === "bunny" ? "/stream/master.m3u8" : ""
        };
    }

    function normalizarCatalogoEditor(config) {
        if (Array.isArray(config?.transmissions)) {
            streamTransmissions = config.transmissions.map((transmission, transmissionIndex) => {
                const options = Array.isArray(transmission.options)
                    ? transmission.options.map((option, optionIndex) => ({
                        id: option.id || crearIdEditor("opcion"),
                        label: option.label || `Opción ${optionIndex + 1}`,
                        source_type: option.source_type || (option.type === "iframe" ? "iframe" : "external"),
                        enabled: option.enabled !== false,
                        url: option.url || "",
                        path: option.path || "/stream/master.m3u8"
                    }))
                    : [];

                return {
                    id: transmission.id || crearIdEditor("transmision"),
                    name: transmission.name || transmission.title || `Transmisión ${transmissionIndex + 1}`,
                    channel: transmission.channel || "",
                    visible: transmission.visible !== false,
                    default_option_id: transmission.default_option_id || options[0]?.id || "",
                    options
                };
            });
            defaultTransmissionId = config.default_transmission_id || streamTransmissions[0]?.id || "";
            return;
        }

        const primary = config?.active_source || "iframe";
        const legacyOption = crearOpcion(primary, 0);
        if (primary === "iframe") legacyOption.url = config?.iframe_url || "";
        if (primary === "external") legacyOption.url = config?.external_url || "";
        if (primary === "bunny") legacyOption.path = "/stream/master.m3u8";

        const transmission = {
            id: crearIdEditor("transmision"),
            name: "Transmisión principal",
            channel: "",
            visible: true,
            default_option_id: legacyOption.id,
            options: [legacyOption]
        };
        streamTransmissions = [transmission];
        defaultTransmissionId = transmission.id;
    }

    function sourceTypeOptions(selected) {
        return [
            ["iframe", "Iframe"],
            ["external", "Servidor externo (OBS/HLS)"],
            ["bunny", "Bunny CDN (OBS)"]
        ].map(([value, label]) =>
            `<option value="${value}"${selected === value ? " selected" : ""}>${label}</option>`
        ).join("");
    }

    function sourceInputMeta(option) {
        if (option.source_type === "bunny") {
            return {
                field: "path",
                label: "Ruta Bunny",
                value: option.path || "/stream/master.m3u8",
                placeholder: "/stream/partido1/master.m3u8"
            };
        }
        if (option.source_type === "external") {
            return {
                field: "url",
                label: "URL HLS",
                value: option.url || "",
                placeholder: "https://live.example.com/live/partido.m3u8"
            };
        }
        return {
            field: "url",
            label: "URL del iframe",
            value: option.url || "",
            placeholder: "https://player.example.com/index.php?..."
        };
    }

    function renderTransmissions() {
        const container = document.getElementById('transmissionList');

        if (!streamTransmissions.length) {
            container.innerHTML = '<div class="empty-streams">No hay transmisiones configuradas.</div>';
            return;
        }

        container.innerHTML = streamTransmissions.map((transmission, transmissionIndex) => {
            const optionRows = transmission.options.map((option, optionIndex) => {
                const input = sourceInputMeta(option);
                const isDefaultOption = transmission.default_option_id === option.id;

                return `<div class="option-row" data-option-id="${escapeAttr(option.id)}">
                    <div>
                        <label class="field-label">Nombre de opción</label>
                        <input type="text" data-field="option-label" value="${escapeAttr(option.label)}" placeholder="Opción ${optionIndex + 1}" maxlength="40">
                        <label class="check-row">
                            <input type="radio" name="default-option-${escapeAttr(transmission.id)}" data-field="default-option" ${isDefaultOption ? "checked" : ""}>
                            Predeterminada
                        </label>
                    </div>
                    <div>
                        <label class="field-label">Tipo de fuente</label>
                        <select data-field="source-type">${sourceTypeOptions(option.source_type)}</select>
                        <label class="check-row">
                            <input type="checkbox" data-field="option-enabled" ${option.enabled ? "checked" : ""}>
                            Activa
                        </label>
                    </div>
                    <div>
                        <label class="field-label">${input.label}</label>
                        <input type="text" data-field="${input.field}" value="${escapeAttr(input.value)}" placeholder="${escapeAttr(input.placeholder)}" autocomplete="off">
                    </div>
                    <div class="option-actions">
                        <button type="button" class="btn-neutral" data-action="test-option">Probar</button>
                        <button type="button" class="btn-danger" data-action="remove-option">Eliminar</button>
                    </div>
                </div>`;
            }).join("");

            return `<div class="transmission-item" data-transmission-id="${escapeAttr(transmission.id)}">
                <div class="transmission-head">
                    <strong>Transmisión ${transmissionIndex + 1}</strong>
                    <div class="compact-actions">
                        <button type="button" class="btn-neutral" data-action="move-up" ${transmissionIndex === 0 ? "disabled" : ""}>Subir</button>
                        <button type="button" class="btn-neutral" data-action="move-down" ${transmissionIndex === streamTransmissions.length - 1 ? "disabled" : ""}>Bajar</button>
                        <button type="button" class="btn-danger" data-action="remove-transmission">Eliminar</button>
                    </div>
                </div>
                <div class="transmission-fields">
                    <div>
                        <label class="field-label">Nombre visible del partido o evento</label>
                        <input type="text" data-field="transmission-name" value="${escapeAttr(transmission.name)}" placeholder="Ej: Argentina vs España" maxlength="80">
                    </div>
                    <div>
                        <label class="field-label">Canal interno opcional</label>
                        <input type="text" data-field="transmission-channel" value="${escapeAttr(transmission.channel)}" placeholder="Ej: DSports AR" maxlength="80">
                    </div>
                </div>
                <div style="display:flex; gap:18px; flex-wrap:wrap;">
                    <label class="check-row">
                        <input type="checkbox" data-field="transmission-visible" ${transmission.visible ? "checked" : ""}>
                        Visible en la web
                    </label>
                    <label class="check-row">
                        <input type="radio" name="default-transmission" data-field="default-transmission" ${defaultTransmissionId === transmission.id ? "checked" : ""}>
                        Transmisión predeterminada
                    </label>
                </div>
                <div class="option-list">${optionRows}</div>
                <button type="button" class="btn-neutral" style="width:auto; margin-top:12px;" data-action="add-option">Agregar opción</button>
            </div>`;
        }).join("");
    }

    function buscarTransmision(element) {
        const transmissionElement = element.closest('[data-transmission-id]');
        if (!transmissionElement) return null;
        return streamTransmissions.find(
            transmission => transmission.id === transmissionElement.dataset.transmissionId
        ) || null;
    }

    function buscarOpcion(transmission, element) {
        const optionElement = element.closest('[data-option-id]');
        if (!transmission || !optionElement) return null;
        return transmission.options.find(option => option.id === optionElement.dataset.optionId) || null;
    }

    function agregarTransmision() {
        if (streamTransmissions.length >= 10) {
            return setStreamConfigStatus("Solo se permiten 10 transmisiones.", "error");
        }

        const option = crearOpcion("iframe", 0);
        const transmission = {
            id: crearIdEditor("transmision"),
            name: "",
            channel: "",
            visible: true,
            default_option_id: option.id,
            options: [option]
        };
        streamTransmissions.push(transmission);
        if (!defaultTransmissionId) defaultTransmissionId = transmission.id;
        renderTransmissions();
        setStreamConfigStatus("Nueva transmisión pendiente de guardar.");
    }

    function handleTransmissionInput(event) {
        const transmission = buscarTransmision(event.target);
        if (!transmission) return;
        const option = buscarOpcion(transmission, event.target);
        const field = event.target.dataset.field;

        if (field === "transmission-name") transmission.name = event.target.value;
        if (field === "transmission-channel") transmission.channel = event.target.value;
        if (field === "transmission-visible") transmission.visible = event.target.checked;
        if (field === "default-transmission" && event.target.checked) {
            defaultTransmissionId = transmission.id;
        }
        if (!option) return;

        if (field === "option-label") option.label = event.target.value;
        if (field === "option-enabled") option.enabled = event.target.checked;
        if (field === "default-option" && event.target.checked) {
            transmission.default_option_id = option.id;
        }
        if (field === "url") option.url = event.target.value;
        if (field === "path") option.path = event.target.value;
        if (field === "source-type") {
            option.source_type = event.target.value;
            if (option.source_type === "bunny" && !option.path) {
                option.path = "/stream/master.m3u8";
            }
            renderTransmissions();
        }
    }

    function handleTransmissionAction(event) {
        const button = event.target.closest('[data-action]');
        if (!button) return;
        const transmission = buscarTransmision(button);
        if (!transmission) return;
        const option = buscarOpcion(transmission, button);
        const action = button.dataset.action;
        const transmissionIndex = streamTransmissions.indexOf(transmission);

        if (action === "add-option") {
            if (transmission.options.length >= 5) {
                return setStreamConfigStatus("Solo se permiten 5 opciones por transmisión.", "error");
            }
            transmission.options.push(crearOpcion("iframe", transmission.options.length));
            renderTransmissions();
            return;
        }

        if (action === "remove-option" && option) {
            if (!confirm(`¿Eliminar ${option.label || "esta opción"}?`)) return;
            transmission.options = transmission.options.filter(item => item.id !== option.id);
            if (transmission.default_option_id === option.id) {
                transmission.default_option_id = transmission.options[0]?.id || "";
            }
            renderTransmissions();
            return;
        }

        if (action === "test-option" && option) {
            if (option.source_type === "bunny") {
                return setStreamConfigStatus("Bunny se prueba desde la web porque necesita una URL firmada.");
            }
            if (!isValidHttpsUrl(option.url)) {
                return setStreamConfigStatus("La opción necesita una URL HTTPS válida.", "error");
            }
            window.open(option.url, '_blank', 'noopener,noreferrer');
            return;
        }

        if (action === "remove-transmission") {
            if (!confirm(`¿Eliminar ${transmission.name || "esta transmisión"}?`)) return;
            streamTransmissions = streamTransmissions.filter(item => item.id !== transmission.id);
            if (defaultTransmissionId === transmission.id) {
                defaultTransmissionId = streamTransmissions[0]?.id || "";
            }
            renderTransmissions();
            return;
        }

        if (action === "move-up" && transmissionIndex > 0) {
            [streamTransmissions[transmissionIndex - 1], streamTransmissions[transmissionIndex]] =
                [streamTransmissions[transmissionIndex], streamTransmissions[transmissionIndex - 1]];
            renderTransmissions();
            return;
        }

        if (action === "move-down" && transmissionIndex < streamTransmissions.length - 1) {
            [streamTransmissions[transmissionIndex + 1], streamTransmissions[transmissionIndex]] =
                [streamTransmissions[transmissionIndex], streamTransmissions[transmissionIndex + 1]];
            renderTransmissions();
        }
    }

    const transmissionListElement = document.getElementById('transmissionList');
    transmissionListElement.addEventListener('input', handleTransmissionInput);
    transmissionListElement.addEventListener('change', handleTransmissionInput);
    transmissionListElement.addEventListener('click', handleTransmissionAction);

    async function cargarConfigStream() {
        try {
            setStreamConfigStatus("Cargando configuración...");
            const res = await adminFetch('/admin/ver-config-stream', {
                method: 'POST',
                body: JSON.stringify({})
            });
            const data = await res.json();

            if (!res.ok || !data.success) {
                throw new Error(data.message || "No se pudo cargar la configuración.");
            }

            const config = data.config || {};
            normalizarCatalogoEditor(config);
            renderTransmissions();
            const visibleCount = streamTransmissions.filter(transmission => transmission.visible).length;
            const version = config.version ? ` Versión: ${config.version}.` : "";
            setStreamConfigStatus(
                `${visibleCount} transmisión(es) visible(s). Configuración sincronizada.${version}`,
                "ok"
            );

        } catch (error) {
            console.error("Error cargando configuración de stream:", error);
            setStreamConfigStatus(error.message || "Error cargando configuración.", "error");
        }
    }

    async function guardarConfigStream() {
        const saveButton = document.getElementById('btnSaveStream');
        const errors = [];

        streamTransmissions.forEach((transmission, transmissionIndex) => {
            const name = transmission.name.trim();
            if (!name) errors.push(`Transmisión ${transmissionIndex + 1}: falta el nombre visible.`);
            if (!transmission.options.length) errors.push(`${name || `Transmisión ${transmissionIndex + 1}`}: agrega una opción.`);

            transmission.options.forEach((option, optionIndex) => {
                option.label = option.label.trim() || `Opción ${optionIndex + 1}`;
                if (option.source_type === "bunny") {
                    const path = String(option.path || "").trim();
                    if (!path.startsWith('/stream/') || !path.toLowerCase().endsWith('.m3u8') || path.includes('..')) {
                        errors.push(`${name || `Transmisión ${transmissionIndex + 1}`} / ${option.label}: ruta Bunny inválida.`);
                    }
                } else if (!isValidHttpsUrl(option.url)) {
                    errors.push(`${name || `Transmisión ${transmissionIndex + 1}`} / ${option.label}: URL HTTPS inválida.`);
                }
            });

            const enabledOptions = transmission.options.filter(option => option.enabled);
            if (transmission.visible && !enabledOptions.length) {
                errors.push(`${name || `Transmisión ${transmissionIndex + 1}`}: activa al menos una opción.`);
            }
            if (!enabledOptions.some(option => option.id === transmission.default_option_id)) {
                transmission.default_option_id = enabledOptions[0]?.id || transmission.options[0]?.id || "";
            }
        });

        if (errors.length) {
            return setStreamConfigStatus(errors[0], "error");
        }

        const publicTransmissions = streamTransmissions.filter(transmission =>
            transmission.visible && transmission.options.some(option => option.enabled)
        );
        if (!publicTransmissions.some(transmission => transmission.id === defaultTransmissionId)) {
            defaultTransmissionId = publicTransmissions[0]?.id || "";
        }

        try {
            saveButton.disabled = true;
            setStreamConfigStatus("Guardando configuración...");
            const res = await adminFetch('/admin/actualizar-config-stream', {
                method: 'POST',
                body: JSON.stringify({
                    default_transmission_id: defaultTransmissionId,
                    transmissions: streamTransmissions
                })
            });
            const data = await res.json();

            if (!res.ok || !data.success) {
                throw new Error(data.message || "No se pudo guardar la configuración.");
            }

            normalizarCatalogoEditor(data.config || {
                transmissions: streamTransmissions,
                default_transmission_id: defaultTransmissionId
            });
            renderTransmissions();
            const savedVersion = data.stream_config_version || data.config?.version || "";
            setStreamConfigStatus(
                `Aplicado: ${publicTransmissions.length} transmisión(es) visible(s).` +
                (savedVersion ? ` Versión: ${savedVersion}.` : ""),
                "ok"
            );

        } catch (error) {
            console.error("Error guardando configuración de stream:", error);
            setStreamConfigStatus(error.message || "Error guardando configuración.", "error");
        } finally {
            saveButton.disabled = false;
        }
    }

    function formatearFechaPeru(fecha) {
        return fecha.toLocaleString('es-PE', {
            timeZone: 'America/Lima',
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            hour12: true
        });
    }

    function escapeHtml(value) {
        return String(value ?? "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
        return escapeHtml(value).replaceAll("`", "&#096;");
    }

    function formatearSesion(status) {
        const mapa = {
            active: "Activo",
            stream_started: "Iniciado",
            stream_renewed: "Renovado",
            expired: "Expirado",
            replaced_session: "Reemplazado",
            revoked_by_admin: "Revocado",
            "-": "-"
        };
        return mapa[status] || status || "-";
    }

    function claseSesion(status) {
        if (status === "active" || status === "stream_renewed" || status === "stream_started") {
            return "badge-ok";
        }
        if (status === "replaced_session") {
            return "badge-warn";
        }
        if (status === "expired" || status === "revoked_by_admin") {
            return "badge-danger";
        }
        return "badge-session";
    }

    function formatearClave(passwordStored) {
        if (passwordStored === false) {
            return `<span class="badge badge-ok">No almacenada</span>`;
        }
        return `<span class="badge badge-warn">Antigua</span>`;
    }

    function resumirUserAgent(userAgent) {
        if (!userAgent || userAgent === "Sin registro") return "Sin registro";

        const ua = userAgent.toLowerCase();

        if (ua.includes("tizen")) return "Samsung TV";
        if (ua.includes("webos")) return "LG Smart TV";
        if (ua.includes("android tv")) return "Android TV";
        if (ua.includes("aft") || ua.includes("fire tv")) return "Fire TV";
        if (ua.includes("roku")) return "Roku TV";
        if (ua.includes("smart-tv") || ua.includes("smarttv") || ua.includes("hbbtv")) return "Smart TV";

        if (ua.includes("iphone")) return "iPhone";
        if (ua.includes("ipad")) return "iPad";
        if (ua.includes("android")) return "Android";
        if (ua.includes("windows")) return "Windows";
        if (ua.includes("mac os")) return "Mac";

        if (ua.includes("edg")) return "Edge";
        if (ua.includes("chrome")) return "Chrome";
        if (ua.includes("firefox")) return "Firefox";
        if (ua.includes("safari") && !ua.includes("chrome")) return "Safari";

        return "Navegador";
    }

    function formatearTipoAcceso(u) {
        if (u.tipo_acceso === "partido" || u.login_mode === "quick_code") {
            return "⚡ Código rápido";
        }

        if (u.tipo_acceso === "vip" || u.login_mode === "email_password") {
            return "💎 Socio VIP";
        }

        if (u.tiene_codigo_rapido) {
            return "⚡ Código rápido";
        }

        return "Manual / antiguo";
    }

    async function generarPase(esSocio) {

            ? document.getElementById('socioEmail').value.trim()
            : document.getElementById('nombrePartido').value.trim();

        if (!nombre) return alert("Faltan datos");

        if (esSocio && !nombre.includes('@')) {
            return alert("Ingresa un email válido para el socio VIP.");
        }

        let fecha = esSocio ? new Date() : new Date(document.getElementById('fechaCorte').value);

        if (Number.isNaN(fecha.getTime())) {
            return alert("Selecciona una fecha válida.");
        }

        if (esSocio) {
            fecha.setDate(fecha.getDate() + parseInt(document.getElementById('socioMeses').value));
        }

        try {

                    email_manual: esSocio ? nombre : null
                })

www.golazosp.net

${d.usuario}

${d.clave}

📲 ¿CÓMO INGRESAR?

                    // 🔥 AJUSTE: Mensaje perfeccionado de Pase Rápido
                    msg = `✅ ¡ACCESO GOLAZO SP LISTO! ⚽

    async function cargarUsuarios() {
        if (cargandoUsuarios) return;

        cargandoUsuarios = true;

        try {
            const res = await adminFetch('/admin/listar-usuarios', {
                method: 'POST',
                body: JSON.stringify({})
            });

            const rawText = await res.text();

            let d = {};
            try {
                d = JSON.parse(rawText);
            } catch (e) {
                console.error("Respuesta no JSON al listar usuarios:", rawText);
                alert("❌ Error inesperado listando usuarios.");
                return;
            }

            if (!d.success) {
                alert(d.message || "❌ No se pudo cargar la auditoría.");
                return;
            }

            const rows = d.usuarios.map(u => {
                const uid = escapeAttr(u.uid || "");
                const usuario = escapeHtml(u.usuario_corto || "-");
                const usuarioAttr = escapeAttr(u.usuario_corto || "-");
                const etiqueta = escapeHtml(u.etiqueta || "-");
                const tipoAcceso = escapeHtml(formatearTipoAcceso(u));
                const estado = escapeHtml(u.estado || "-");
                const tiempo = escapeHtml(u.tiempo || "-");
                const ultimaConexion = escapeHtml(u.ultima_conexion || "-");
                const ip = escapeHtml(u.last_ip || "Sin registro");
                const status = u.last_status || "-";
                const statusTexto = escapeHtml(formatearSesion(status));
                const sessionClass = claseSesion(status);
                const userAgent = escapeAttr(u.last_user_agent || "Sin registro");
                const navegador = escapeHtml(resumirUserAgent(u.last_user_agent || ""));

                const puedeRevocar = u.esActivo && status !== "revoked_by_admin";

                return `<tr>
                    <td>
                        <b>${usuario}</b>
                        <div class="muted">${navegador}</div>
                    </td>
                    <td>
                        <b>${etiqueta}</b>
                        <div class="muted">${tipoAcceso}</div>
                    </td>
                    <td>
                        <span class="badge" style="background:${u.esActivo ? '#065f46' : '#7f1d1d'}">${estado}</span>
                    </td>
                    <td>${tiempo}</td>
                    <td>${ultimaConexion}</td>
                    <td class="ip-cell" title="${userAgent}">${ip}</td>
                    <td>
                        <span class="badge ${sessionClass}">${statusTexto}</span>
                    </td>
                    <td>${formatearClave(u.password_stored)}</td>
                    <td>
                        <button 
                            class="btn-small btn-danger btn-revocar"
                            data-uid="${uid}"
                            data-user="${usuarioAttr}"
                            ${puedeRevocar ? "" : "disabled"}
                        >
                            Revocar
                        </button>
                    </td>
                </tr>`;
            }).join('');

            document.getElementById('tablaUsuarios').innerHTML = rows || `
                <tr>
                    <td colspan="9" style="text-align:center; color:#94a3b8;">
                        No hay usuarios para mostrar.
                    </td>
                </tr>
            `;

            document.querySelectorAll('.btn-revocar').forEach(btn => {
                btn.addEventListener('click', () => {
                    const uid = btn.dataset.uid;
                    const usuario = btn.dataset.user;
                    revocarSesion(uid, usuario);
                });
            });

        } catch(e) {
            console.error("Error cargando usuarios:", e);
            alert("❌ Error de servidor cargando auditoría.");
        } finally {
            cargandoUsuarios = false;
        }
    }

    async function revocarSesion(uid, usuario) {
        if (!uid) {
            return alert("UID inválido.");
        }

        const ok = confirm(`¿Revocar la sesión activa de ${usuario}?\n\nEl usuario será expulsado de la transmisión en breve.`);

        if (!ok) return;

        try {
            const res = await adminFetch('/admin/revocar-sesion', {
                method: 'POST',
                body: JSON.stringify({ uid })
            });

            const d = await res.json();

            if (d.success) {
                alert(d.message || "✅ Sesión revocada.");
                cargarUsuarios();
                return;
            }

            alert(d.message || "❌ No se pudo revocar la sesión.");

        } catch (e) {
            console.error("Error revocando sesión:", e);
            alert("❌ Error de servidor al revocar sesión.");
        }
    }

    async function limpiarCaducados() {
        if (!confirm("¿Limpiar usuarios vencidos?\n\nRecomendación: úsalo solo después de terminar la transmisión o cuando ya no necesites revisar esos accesos en auditoría.")) return;

        try {
            const res = await adminFetch('/admin/limpiar-caducados', {
                method: 'POST',
                body: JSON.stringify({})
            });

            const d = await res.json();
            alert(d.mensaje || "Proceso finalizado.");
            cargarUsuarios();

        } catch(e) {
            alert("❌ Error de servidor");
        }
    }
