<script>
    const BACKEND_URL = "https://golazo-backend-ellz.onrender.com";

    // Carga fecha por defecto (+4 horas) al abrir el panel
    window.onload = () => {
        let n = new Date();
        n.setHours(n.getHours() + 4);
        n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
        document.getElementById('fechaCorte').value = n.toISOString().slice(0,16);
    };

    async function actualizarBot() {
        const s = document.getElementById('adminSecret').value;
        if(!s) return alert("Ingresa clave maestra");
        try {
            const res = await fetch(`${BACKEND_URL}/admin/update-bot`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    admin_secret: s,
                    promo_hoy: document.getElementById('botPromo').value,
                    partidos_cartelera: document.getElementById('botPartidos').value,
                    link_vip: document.getElementById('botLinkVip').value
                })
            });
            if(res.ok) alert("✅ Bot actualizado con éxito");
            else alert("❌ Error: Clave incorrecta o servidor caído");
        } catch(e) { alert("❌ Error de red: No se pudo conectar al backend"); }
    }

    async function generarPase(esSocio) {
        const s = document.getElementById('adminSecret').value;
        const nombre = esSocio ? document.getElementById('socioEmail').value : document.getElementById('nombrePartido').value;
        if(!s || !nombre) return alert("Faltan datos (Clave o Nombre)");

        let fecha = esSocio ? new Date() : new Date(document.getElementById('fechaCorte').value);
        if(esSocio) fecha.setHours(fecha.getHours() + parseInt(document.getElementById('socioMeses').value));

        try {
            const res = await fetch(`${BACKEND_URL}/admin/generar-pase-rapido`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    admin_secret: s, 
                    fecha_corte: fecha.toISOString(), 
                    partido: esSocio ? "SOCIO VIP ⭐" : nombre, 
                    email_manual: esSocio ? nombre : null 
                })
            });
            const d = await res.json();
            if(d.success) {
                const box = esSocio ? document.getElementById('resSocio') : document.getElementById('resPase');
                const linkVip = document.getElementById('botLinkVip').value || "Solicitar al soporte";
                
                let msg = "";
                if(esSocio) {
                    msg = `🔥 ¡BIENVENIDO SOCIO VIP! 🔥\n━━━━━━━━━━━━━━\n1️⃣ Grupo VIP: ${linkVip}\n2️⃣ Web: www.golazosp.net\n👤 User: ${d.usuario}\n🔑 Pass: ${d.clave}\n━━━━━━━━━━━━━━\n¡Disfruta tu acceso mensual!`;
                } else {
                    msg = `✅ ¡ACCESO LISTO! ⚽\n━━━━━━━━━━━━━━\n🌐 www.golazosp.net\n👤 User: ${d.usuario}\n🔑 Pass: ${d.clave}\n━━━━━━━━━━━━━━\n⏳ Expira: ${d.expira_en}`;
                }

                box.innerText = msg;
                box.style.display = "block";
                await navigator.clipboard.writeText(msg);
                alert("¡Acceso creado y copiado!");
                cargarUsuarios();
            } else { alert("❌ Error: " + (d.message || "No autorizado")); }
        } catch(e) { alert("❌ Error al conectar con el servidor."); }
    }

    async function cargarUsuarios() {
        const s = document.getElementById('adminSecret').value;
        if(!s) return;
        try {
            const res = await fetch(`${BACKEND_URL}/admin/listar-usuarios`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ admin_secret: s })
            });
            const d = await res.json();
            if(d.success) {
                const tbody = document.getElementById('tablaUsuarios');
                tbody.innerHTML = d.usuarios.map(u => `<tr>
                    <td><b>${u.usuario_corto}</b></td>
                    <td>${u.etiqueta}</td>
                    <td><span class="badge" style="background:${u.esActivo ? '#065f46' : '#7f1d1d'}">${u.estado}</span></td>
                    <td>${u.tiempo}</td>
                </tr>`).join('');
            }
        } catch(e) { console.error("Error cargando usuarios"); }
    }

    async function limpiarCaducados() {
        const s = document.getElementById('adminSecret').value;
        if(!confirm("¿Seguro que quieres borrar los pases vencidos?")) return;
        try {
            const res = await fetch(`${BACKEND_URL}/admin/limpiar-caducados`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ admin_secret: s })
            });
            const d = await res.json();
            alert(d.mensaje);
            cargarUsuarios();
        } catch(e) { alert("❌ Error al limpiar"); }
    }
</script>
