<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOLAZO SP - Panel Móvil v2.0</title>
    <style>
        :root {
            --primary: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text: #f8fafc;
            --border: #334155;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text); 
            margin: 0; 
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .dashboard { 
            width: 100%; 
            max-width: 1100px; 
            background: var(--bg-card); 
            padding: 15px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border-top: 5px solid var(--primary);
        }

        h1 { 
            text-align: center; 
            color: var(--primary); 
            font-size: 20px; 
            margin: 10px 0 20px 0;
            letter-spacing: 1px;
        }

        .secret-input {
            margin-bottom: 20px;
        }

        /* Grid que se adapta: 3 columnas en PC, 1 en Celular */
        .grid-top { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 15px; 
        }

        .section { 
            background: var(--bg-dark); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            display: flex; 
            flex-direction: column;
            gap: 10px;
        }

        h2 { 
            margin: 0 0 10px 0; 
            font-size: 14px; 
            color: #94a3b8; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 8px; 
            text-transform: uppercase;
        }

        input, select { 
            width: 100%; 
            padding: 14px; /* Más grande para dedos */
            border-radius: 8px; 
            border: 1px solid #475569; 
            background: var(--bg-card); 
            color: white; 
            font-size: 16px; /* Evita zoom automático en iPhone/Samsung */
            box-sizing: border-box;
        }

        button { 
            width: 100%; 
            padding: 16px; 
            font-weight: bold; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 14px;
            transition: transform 0.1s;
            touch-action: manipulation;
        }

        button:active { transform: scale(0.97); }

        .btn-crear { background: #10b981; color: white; }
        .btn-socio { background: #f59e0b; color: white; }
        .btn-extender { background: #3b82f6; color: white; }
        .btn-refresh { background: var(--primary); color: white; flex: 1; }
        .btn-clean { background: #475569; color: white; flex: 1; }

        .resultado-box { 
            background: #000; 
            border: 1px solid #22c55e; 
            color: #22c55e; 
            padding: 15px;
            border-radius: 8px; 
            font-family: 'Courier New', monospace; 
            display: none; 
            white-space: pre-wrap; 
            font-size: 13px;
            margin-top: 10px;
        }

        /* Tabla Responsiva */
        .audit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0 15px 0;
        }

        .table-wrapper {
            overflow-x: auto;
            background: var(--bg-dark);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #1e293b; padding: 15px; text-align: left; font-size: 12px; color: #94a3b8; }
        td { padding: 15px; border-bottom: 1px solid #1e293b; font-size: 14px; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .bg-green { background: #065f46; color: #34d399; }
        .bg-red { background: #7f1d1d; color: #f87171; }

        @media (max-width: 600px) {
            h1 { font-size: 18px; }
            .section { padding: 15px; }
            .audit-header { flex-direction: column; gap: 10px; align-items: flex-start; }
            .audit-header div { width: 100%; display: flex; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>⚙️ GOLAZO SP - PANEL MAESTRO</h1>
    
    <div class="secret-input">
        <input type="password" id="adminSecret" placeholder="🔐 Ingresa Clave Maestra para activar">
    </div>

    <div class="grid-top">
        <div class="section">
            <h2>⚡ PASE RÁPIDO</h2>
            <input type="text" id="nombrePartido" placeholder="Ej: Perú vs Brasil">
            <input type="datetime-local" id="fechaCorte">
            <button class="btn-crear" onclick="generarPase()">Generar y Copiar</button>
            <div id="resPase" class="resultado-box"></div>
        </div>

        <div class="section" style="border-left: 4px solid #f59e0b;">
            <h2>💎 SOCIO MENSUAL</h2>
            <input type="text" id="socioEmail" placeholder="Email del cliente">
            <input type="text" id="socioPass" placeholder="Clave temporal">
            <select id="socioMeses">
                <option value="720">Plan 1 Mes</option>
                <option value="1440">Plan 2 Meses</option>
            </select>
            <button class="btn-socio" onclick="registrarSocio()">Activar Socio</button>
            <div id="resSocio" class="resultado-box" style="border-color: #f59e0b; color: #f59e0b;"></div>
        </div>

        <div class="section" style="border-left: 4px solid #3b82f6;">
            <h2>⏱️ TIEMPO EXTRA</h2>
            <input type="text" id="usuarioExtender" placeholder="Usuario o Email">
            <select id="horasExtra">
                <option value="0.25">15 Minutos</option>
                <option value="1" selected>1 Hora</option>
                <option value="2">2 Horas</option>
                <option value="720">Añadir 1 Mes</option>
            </select>
            <button class="btn-extender" onclick="extenderPase()">Aplicar Tiempo</button>
        </div>
    </div>

    <div class="audit-header">
        <h2 style="border:none; margin:0;">📊 AUDITORÍA DE ACCESOS</h2>
        <div style="display: flex; gap: 8px;">
            <button class="btn-refresh" onclick="cargarUsuarios()">🔄</button>
            <button class="btn-clean" onclick="limpiarCaducados()">🧹 Limpiar</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>USUARIO</th>
                    <th>ETIQUETA</th>
                    <th>ESTADO</th>
                    <th>TIEMPO</th>
                </tr>
            </thead>
            <tbody id="tablaUsuarios">
                </tbody>
        </table>
    </div>
</div>

<script>
    const BACKEND_URL = "https://golazo-backend-ellz.onrender.com";

    // Configura la fecha de hoy + 4 horas por defecto para el corte
    window.onload = () => {
        let n = new Date(); 
        n.setHours(n.getHours() + 4); 
        n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
        document.getElementById('fechaCorte').value = n.toISOString().slice(0,16);
    };

    async function generarPase() {
        const s = document.getElementById('adminSecret').value;
        const resBox = document.getElementById('resPase');
        if(!s) return alert("Ingresa la clave maestra");
        
        try {
            const res = await fetch(`${BACKEND_URL}/admin/generar-pase-rapido`, {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    admin_secret: s, 
                    fecha_corte: new Date(document.getElementById('fechaCorte').value).toISOString(), 
                    partido: document.getElementById('nombrePartido').value 
                })
            });
            const d = await res.json();
            if(d.success) {
                const m = `✅ ¡ACCESO LISTO! ⚽\n━━━━━━━━━━━━━━\n🌐 Link: www.golazosp.net\n👤 User: ${d.usuario}\n🔑 Pass: ${d.clave}\n━━━━━━━━━━━━━━\n⏳ Expira: ${d.expira_en}`;
                resBox.innerText = m; 
                resBox.style.display = "block"; 
                navigator.clipboard.writeText(m);
                alert("¡Copiado al WhatsApp!");
                cargarUsuarios();
            }
        } catch(e) { alert("Error al conectar con el servidor"); }
    }

    async function registrarSocio() {
        const s = document.getElementById('adminSecret').value;
        const resBox = document.getElementById('resSocio');
        const f = new Date(); 
        f.setHours(f.getHours() + parseInt(document.getElementById('socioMeses').value));
        
        try {
            const res = await fetch(`${BACKEND_URL}/admin/generar-pase-rapido`, {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    admin_secret: s, 
                    fecha_corte: f.toISOString(), 
                    partido: "SOCIO VIP ⭐", 
                    email_manual: document.getElementById('socioEmail').value, 
                    pass_manual: document.getElementById('socioPass').value 
                })
            });
            const d = await res.json();
            if(d.success) {
                const m = `⭐ BIENVENIDO A GOLAZO VIP ⭐\n━━━━━━━━━━━━━━\n👤 Usuario: ${d.usuario}\n🔑 Clave: ${d.clave}\n📅 Expira: ${d.expira_en}\n━━━━━━━━━━━━━━\n¡Gracias por tu suscripción!`;
                resBox.innerText = m; 
                resBox.style.display = "block"; 
                navigator.clipboard.writeText(m);
                alert("Socio registrado y datos copiados.");
                cargarUsuarios();
            }
        } catch(e) { alert("Error"); }
    }

    async function extenderPase() {
        const s = document.getElementById('adminSecret').value;
        const user = document.getElementById('usuarioExtender').value;
        if(!user) return alert("Escribe el usuario");
        
        try {
            const res = await fetch(`${BACKEND_URL}/admin/extender-acceso`, {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    admin_secret: s, 
                    usuario_corto: user, 
                    horas_extra: document.getElementById('horasExtra').value 
                })
            });
            const d = await res.json(); 
            alert(d.mensaje || "Tiempo actualizado"); 
            cargarUsuarios();
        } catch(e) { alert("Error"); }
    }

    async function cargarUsuarios() {
        const s = document.getElementById('adminSecret').value;
        if(!s) return;
        try {
            const res = await fetch(`${BACKEND_URL}/admin/listar-usuarios`, {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ admin_secret: s })
            });
            const d = await res.json();
            if(d.success) {
                const tbody = document.getElementById('tablaUsuarios'); 
                tbody.innerHTML = '';
                d.usuarios.forEach(u => {
                    const b = u.esActivo ? 'bg-green' : 'bg-red';
                    tbody.innerHTML += `
                        <tr>
                            <td><b>${u.usuario_corto}</b><br><small style="color:#64748b">${u.email}</small></td>
                            <td>${u.etiqueta}</td>
                            <td><span class="badge ${b}">${u.estado}</span></td>
                            <td>${u.tiempo}</td>
                        </tr>`;
                });
            }
        } catch (e) {}
    }

    async function limpiarCaducados() {
        const s = document.getElementById('adminSecret').value;
        if(!confirm("¿Seguro que quieres borrar permanentemente a los usuarios caducados?")) return;
        try {
            const res = await fetch(`${BACKEND_URL}/admin/limpiar-caducados`, {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ admin_secret: s })
            });
            const d = await res.json(); 
            alert(d.mensaje); 
            cargarUsuarios();
        } catch (e) { alert("Error al limpiar."); }
    }
    
    // Auto-actualizar la tabla cada 2 minutos si el panel está abierto
    setInterval(() => { if(document.getElementById('adminSecret').value) cargarUsuarios(); }, 120000);
</script>
</body>
</html>
